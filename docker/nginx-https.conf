# Nginx reverse proxy for VPN Control API
# Run: sudo certbot --nginx -d api.zerologin.org

server {
    listen 80;
    listen [::]:80;
    server_name api.zerologin.org;

    # Certbot will add SSL config here
    # After certbot, you'll have:
    # listen 443 ssl;
    # listen [::]:443 ssl;
    # ssl_certificate /etc/letsencrypt/live/api.zerologin.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.zerologin.org/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

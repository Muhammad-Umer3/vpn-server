# Option A: Postgres + Redis only. API runs on host.
# Usage: docker compose up -d
# Then run the API: npm run build && npm start

services:
  postgres:
    image: postgres:15-alpine
    container_name: vpn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vpn
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vpn_secret_change_me}
      POSTGRES_DB: vpn_control
    # Bind to localhost only — do not expose DB to the public internet
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vpn -d vpn_control"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vpn-redis
    restart: unless-stopped
    # Bind to localhost only — Redis must not be reachable from the public internet
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
